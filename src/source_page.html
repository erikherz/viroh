<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>viroh source</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { background: #000; color: #c9d1d9; display: flex; flex-direction: column;
         font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
  header { padding: 8px 14px; border-bottom: 1px solid #21262d; display: flex;
           gap: 12px; align-items: center; background: #0d1117; }
  h1 { font-size: 14px; margin: 0; color: #58ff8c; letter-spacing: 1px; }
  .nid { color: #6e7681; word-break: break-all; }
  main { flex: 1; display: flex; align-items: center; justify-content: center;
         padding: 12px; overflow: hidden; }
  img { max-width: 100%; max-height: 100%; image-rendering: pixelated;
        border: 1px solid #21262d; border-radius: 6px; background: #000; }
  #status { color: #8b949e; }
  #status.err { color: #f85149; }
</style>
</head>
<body>
<header>
  <h1>◧ viroh</h1>
  <span class="nid">{NODE_ID}</span>
  <span style="flex:1"></span>
  <span id="status">connecting…</span>
</header>
<main>
  <img id="v" alt="" />
</main>
<script>
  const img = document.getElementById("v");
  const status = document.getElementById("status");
  const src = "/sources/{NODE_ID}/stream";
  img.onload = () => { status.textContent = "live"; status.className = ""; };
  img.onerror = () => {
    status.textContent = "stream ended — retrying…";
    status.className = "err";
    // The sender may be down or the multipart connection dropped; reconnect.
    setTimeout(() => { img.src = src + "?t=" + Date.now(); }, 2000);
  };
  img.src = src;
</script>
</body>
</html>
